name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest

  test-django:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 4.2 LTS — Python 3.10–3.12
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"

          # Django 5.0 — Python 3.10–3.12
          - python-version: "3.10"
            django-version: "5.0"
          - python-version: "3.11"
            django-version: "5.0"
          - python-version: "3.12"
            django-version: "5.0"

          # Django 5.1 — Python 3.10–3.13
          - python-version: "3.10"
            django-version: "5.1"
          - python-version: "3.11"
            django-version: "5.1"
          - python-version: "3.12"
            django-version: "5.1"
          - python-version: "3.13"
            django-version: "5.1"

          # Django 5.2 LTS — Python 3.10–3.13
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.11"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.13"
            django-version: "5.2"

          # Django 6.0 — Python 3.12–3.13 (not released yet)
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    name: Django ${{ matrix.django-version }} / Python ${{ matrix.python-version }}
    continue-on-error: ${{ matrix.django-version == '6.0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra test

      - name: Install Django ${{ matrix.django-version }}
        run: uv pip install "Django~=${{ matrix.django-version }}.0"

      - name: Run tests
        run: uv run pytest
